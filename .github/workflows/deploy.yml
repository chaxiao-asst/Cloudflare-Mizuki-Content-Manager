name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'default'
        type: choice
        options:
          - default
          - production
          - staging

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Set secrets
        run: |
          ENV="${{ github.event.inputs.environment || 'default' }}"
          if [ "$ENV" = "default" ]; then
            echo "${{ secrets.GH_TOKEN }}"              | npx wrangler secret put GH_TOKEN
            echo "${{ secrets.GH_REPO_OWNER }}"         | npx wrangler secret put GH_REPO_OWNER
            echo "${{ secrets.GH_REPO_NAME }}"          | npx wrangler secret put GH_REPO_NAME
            echo "${{ secrets.CONTENT_REPO_OWNER || '' }}" | npx wrangler secret put CONTENT_REPO_OWNER
            echo "${{ secrets.CONTENT_REPO_NAME || '' }}"  | npx wrangler secret put CONTENT_REPO_NAME
            echo "${{ secrets.ENABLE_CONTENT_SYNC || 'false' }}" | npx wrangler secret put ENABLE_CONTENT_SYNC
          else
            echo "${{ secrets.GH_TOKEN }}"              | npx wrangler secret put GH_TOKEN -e "$ENV"
            echo "${{ secrets.GH_REPO_OWNER }}"         | npx wrangler secret put GH_REPO_OWNER -e "$ENV"
            echo "${{ secrets.GH_REPO_NAME }}"          | npx wrangler secret put GH_REPO_NAME -e "$ENV"
            echo "${{ secrets.CONTENT_REPO_OWNER || '' }}" | npx wrangler secret put CONTENT_REPO_OWNER -e "$ENV"
            echo "${{ secrets.CONTENT_REPO_NAME || '' }}"  | npx wrangler secret put CONTENT_REPO_NAME -e "$ENV"
            echo "${{ secrets.ENABLE_CONTENT_SYNC || 'false' }}" | npx wrangler secret put ENABLE_CONTENT_SYNC -e "$ENV"
          fi

      - name: Deploy to Cloudflare Workers
        run: |
          ENV="${{ github.event.inputs.environment || 'default' }}"
          if [ "$ENV" = "default" ]; then
            npx wrangler deploy
          else
            npx wrangler deploy -e "$ENV"
          fi