name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Set GitHub Token secret
        run: echo "${{ secrets.GH_TOKEN }}" | npx wrangler versions secret put GH_TOKEN -e ${{ github.event.inputs.environment || 'production' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Set GitHub Repo Owner secret
        run: echo "${{ secrets.GH_REPO_OWNER }}" | npx wrangler versions secret put GH_REPO_OWNER -e ${{ github.event.inputs.environment || 'production' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Set GitHub Repo Name secret
        run: echo "${{ secrets.GH_REPO_NAME }}" | npx wrangler versions secret put GH_REPO_NAME -e ${{ github.event.inputs.environment || 'production' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Set Content Repo Owner secret
        run: echo "${{ secrets.CONTENT_REPO_OWNER || '' }}" | npx wrangler versions secret put CONTENT_REPO_OWNER -e ${{ github.event.inputs.environment || 'production' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Set Content Repo Name secret
        run: echo "${{ secrets.CONTENT_REPO_NAME || '' }}" | npx wrangler versions secret put CONTENT_REPO_NAME -e ${{ github.event.inputs.environment || 'production' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Set Enable Content Sync secret
        run: echo "${{ secrets.ENABLE_CONTENT_SYNC || 'false' }}" | npx wrangler versions secret put ENABLE_CONTENT_SYNC -e ${{ github.event.inputs.environment || 'production' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Workers
        run: npx wrangler deploy -e ${{ github.event.inputs.environment || 'production' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}